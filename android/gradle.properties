# Gradle/JVM stability tweaks for low-memory environments
org.gradle.jvmargs=-Xmx2048M -Dkotlin.daemon.jvm.options=-Xmx1024M

# Avoid excessive parallelism that can trigger OOM / Gradle daemon crashes
org.gradle.parallel=false
org.gradle.workers.max=2

# Disable cache transforms to reduce memory pressure
org.gradle.caching=false

# Kotlin incremental compilation can cause cache/incremental issues; disable for stability
kotlin.incremental=false

# Daemon on, but with reduced heap
org.gradle.daemon=true

android.useAndroidX=true





